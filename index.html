<!DOCTYPE html>
<html>
<head>
  <title>Stereo Madness Clone</title>
  <style>
    body {
      margin: 0;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    canvas {
      background: #222;
      border: 2px solid white;
    }
    #score {
      position: absolute;
      color: white;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      font-family: Arial;
      font-size: 20px;
    }
  </style>
</head>
<body>
  <div id="score">Score: 0</div>
  <canvas id="game" width="1000" height="400"></canvas>

  <script src="player.js"></script>
  <script src="obstacles.js"></script>
  <script src="level.js"></script>
  <script src="game.js"></script>
</body>
</html>
